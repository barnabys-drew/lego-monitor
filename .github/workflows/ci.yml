name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ruff:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.7.4
      - name: ruff check
        run: ruff check . --output-format=github
      - name: ruff format check
        run: ruff format --check .

  bandit:
    name: bandit (HIGH severity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit==1.7.10
      - name: bandit on src
        run: bandit -i -r src/ --severity-level high
