version: '3.8'

services:
  lego-monitor:
    build: .
    container_name: lego-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - METRICS_PORT=8888
      - SCRAPE_INTERVAL_SECONDS=3600
    volumes:
      - ./data:/app/data
    ports:
      - "8888:8888"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  lego-data:
